<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Engine</title>
    
    <!-- Load Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src = "https://cdn.tailwindcss.com"></script>
    <style>
        .slide{
            transition: opacity 1.2s ease-in-out;
        }
    </style>

</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <nav class="bg-white shadow-md"></nav>

    <div class="container mx-auto px-6 py-4">
        <h1 class="text-3xl font-bold text-blue-600">BookRec Engine</h1>
    </div>
</nav><!-- Main Content Area -->
<div class="container mx-auto p-6">

    <!-- Slideshow -->
    <section class="mb-12">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-700">Featured Books</h2>
        <div id="slideshow-container" class="relative w-full max-w-3xl mx-auto h-64 md:h-96 bg-gray-300 rounded-lg shadow-xl overflow-hidden">
            <!-- Slides will be added by JavaScript -->
        </div>
    </section>

    <!-- Personalized Recommendations Section -->
    <section class="bg-white p-6 rounded-lg shadow-lg my-12">
        <h2 class="text-2xl font-bold mb-4 text-gray-700">Your Personal AI Recommendations</h2>
        <p class="mb-4 text-gray-600">Enter your User ID and select the dropdown Genre to get recommendations.</p>
        
        <div class="flex flex-col sm:flex-row gap-2">
            <label for="user-id-input" class="sr-only">Your User ID:</label>
            <input type="number" id="user-id-input" placeholder="e.g., 1" value="1" class="w-full sm:w-1/4 border border-gray-300 rounded-md p-3 shadow-sm focus:ring-blue-500 focus:border-blue-500">


            <label for="genre-select" class="sr-only">Select Genre:</label>
                <select id="genre-select" class="w-full sm:w-1/2 border border-gray-300 rounded-md p-3 shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="">All (Use My Favorites)</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Crime">Crime</option>
                    <option value="Poetry">Poetry</option>
                    <option value="Non-Fiction">Non-Fiction</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Thriller">Thriller</option>
                </select>
            <button id="fetch-recs-btn" class="w-full sm:w-1/4 bg-blue-600 text-white font-bold py-3 px-6 rounded-md shadow-md hover:bg-blue-700 transition duration-300">
                    Get Recommendations
            </button> 
            <h3 class="text-xl font-semibold mt-6 mb-2">Your Recommended Books:</h3>
        </section>

        <!-- 5-Star Books Section -->
        <section id="5-star-section" class="my-12">
            <h2 class="text-3xl font-bold mb-6 text-gray-700">Top 5-Star Reads</h2>
            <div id="5-star-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                <!-- Book cards will be added by JavaScript -->
            </div>
            <div class="text-center mt-8">
                <button id="see-more-5-star" class="bg-gray-700 text-white font-semibold py-2 px-5 rounded-md hover:bg-gray-800 transition duration-300 hidden">
                    See More
                </button>
            </div>
        </section>

        
        <!-- 4-Star Books Section -->
        <section id="4-star-section" class="my-12">
            <h2 class="text-3xl font-bold mb-6 text-gray-700">Top 4-Star Reads</h2>
            <div id="4-star-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                <!-- Book cards will be added by JavaScript -->
            </div>
            <div class="text-center mt-8">
                <button id="see-more-4-star" class="bg-gray-700 text-white font-semibold py-2 px-5 rounded-md hover:bg-gray-800 transition duration-300 hidden">
                    See More
                </button>
            </div>
        </section>

    </div>

    <!-- Error Message Area -->
    <div id="error-message" class="p-4 bg-red-100 text-red-700 border border-red-300 rounded-md m-6 fixed bottom-0 right-0 shadow-lg hidden"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- Element References ---
            const recsBtn = document.getElementById("fetch-recs-btn");
            const recsList = document.getElementById("recommendations-list");
            const userIdInput = document.getElementById("user-id-input");
            const genreSelect = document.getElementById("genre-select"); // <-- Get genre dropdown
            const errorDiv = document.getElementById("error-message");
            const slideshowContainer = document.getElementById("slideshow-container");

            // --- Error Handling ---
            let errorTimeout;
            function showError(message) {
                clearTimeout(errorTimeout);
                errorDiv.textContent = `Error: ${message}`;
                errorDiv.classList.remove('hidden');
                errorTimeout = setTimeout(() => {
                    errorDiv.classList.add('hidden');
                }, 5000); // Hide after 5 seconds
            }

            // --- 1. Slideshow Logic ---{ img: "/static/images/prideandprejudice.webp", alt: "..." }
            const slidesContent = [
                { img: "/static/images/prideandprejudice.webp", alt: "Pride and Prejudice" },
                { img: "/static/images/forrestg.webp", alt: "Forrest Gump" },
                { img: "/static/images/catcherrye.webp", alt: "Catcher in the Rye" }
            ];
            let currentSlide = 0;

            if (slideshowContainer) {
                slidesContent.forEach((slide, index) => {
                    const slideEl = document.createElement('div');
                    slideEl.className = 'slide absolute w-full h-full opacity-0';
                    if (index === 0) {
                        slideEl.classList.remove('opacity-0'); // Show first slide
                    }
                    slideEl.innerHTML = `<img src="${slide.img}" alt="${slide.alt}" class="w-full h-full object-cover">`;
                    slideshowContainer.appendChild(slideEl);
                });

                const slides = document.querySelectorAll("#slideshow-container .slide");

                function showSlide(n) {
                    slides.forEach((slide, index) => {
                        if (index === n) {
                            slide.classList.remove('opacity-0');
                        } else {
                            slide.classList.add('opacity-0');
                        }
                    });
                }

                setInterval(() => {
                    currentSlide = (currentSlide + 1) % slides.length;
                    showSlide(currentSlide);
                }, 6000); // Change slide every 6 seconds
            }

            // --- 2. Personalized Recommendations Logic ---
            if (recsBtn) {
                recsBtn.addEventListener("click", async () => {
                    const userId = userIdInput.value;
                    const selectedGenre = genreSelect.value; // <-- Get the selected genre

                    if (!userId) {
                        showError("Please enter a User ID.");
                        return;
                    }

                    errorDiv.classList.add('hidden');
                    recsList.innerHTML = "<li>Training model and predicting...</li>";

                    // Build the URL, adding the genre as a query parameter if selected
                    let apiUrl = `/api/recommendations/${userId}`;
                    if (selectedGenre) {
                        apiUrl += `?genre=${encodeURIComponent(selectedGenre)}`;
                    }

                    try {
                        const response = await fetch(apiUrl); // <-- Use the new dynamic URL
                        if (!response.ok) {
                            throw new Error(`Server responded with status: ${response.status}`);
                        }
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);

                        recsList.innerHTML = ""; 

                        // Show which filter was used
                        if (data.filter_genre_used) {
                            const li = document.createElement("li");
                            li.textContent = `Showing results for Genre: ${data.filter_genre_used}`;
                            li.className = "font-semibold text-blue-600 mb-2 list-none";
                            recsList.appendChild(li);
                        } else if (data.favorite_genres_used && data.favorite_genres_used.length > 0) {
                            const li = document.createElement("li");
                            li.textContent = `Boosting on favorites: ${data.favorite_genres_used.join(', ')}`;
                            li.className = "font-semibold text-gray-600 mb-2 list-none";
                            recsList.appendChild(li);
                        }

                        // Show recommendations
                        if (data.recommendations && data.recommendations.length > 0) {
                            data.recommendations.forEach(productId => {
                                const li = document.createElement("li");
                                li.textContent = `Recommended Book: ${productId}`;
                                li.className = "ml-4"; // Indent the recommendation
                                recsList.appendChild(li);
                            });
                        } else {
                            if (recsList.innerHTML === "") { // Only if no other message is shown
                                recsList.innerHTML = "<li class='list-none'>No recommendations found.</li>";
                            }
                        }
                    } catch (error) {
                        showError(error.message);
                        recsList.innerHTML = "<li class='list-none'>Could not fetch recommendations.</li>";
                    }
                });
            }

            // --- 3. Top Rated Books Logic ---
            const initialLimit = 5; // Show 5 books initially

            function createBookCard(book, index) {
                const placeholderImg = `https://placehold.co/300x400/e2e8f0/64748b?text=${encodeURIComponent(book.title)}`;
                const imgSrc = book.cover_image_url || placeholderImg;
                const hiddenClass = index >= initialLimit ? 'hidden' : '';

                return `
                    <div class="book-card bg-white rounded-lg shadow-md overflow-hidden transform hover:scale-105 transition-transform duration-300 ${hiddenClass}">
                        <img src="${imgSrc}" alt="Cover for ${book.title}" class="w-full h-56 object-cover" onerror="this.src='${placeholderImg}'">
                        <div class="p-4">
                            <h3 class="font-bold text-lg truncate" title="${book.title}">${book.title}</h3>
                            <p class="text-gray-600 text-sm">${book.author || 'Unknown Author'}</p>
                            <p class="text-gray-500 text-sm mt-1">Rating: ${Number(book.avg_rating).toFixed(2)} ★</p>
                        </div>
                    </div>
                `;
            }

            async function loadBookSection(url, listElementId, buttonElementId) {
                const listEl = document.getElementById(listElementId);
                const buttonEl = document.getElementById(buttonElementId);
                if (!listEl || !buttonEl) return;
                
                listEl.innerHTML = "<p>Loading books...</p>";

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Server error: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    
                    const books = data.books;
                    if (!books || books.length === 0) {
                        listEl.innerHTML = "<p>No books found in this category.</p>";
                        return;
                    }

                    listEl.innerHTML = books.map(createBookCard).join('');

                    if (books.length > initialLimit) {
                        buttonEl.classList.remove('hidden');
                        let isShowingAll = false;

                        buttonEl.addEventListener('click', () => {
                            isShowingAll = !isShowingAll;
                            const cards = listEl.querySelectorAll('.book-card');
                            cards.forEach((card, index) => {
                                if (index >= initialLimit) {
                                    card.classList.toggle('hidden');
                                }
                            });
                            buttonEl.textContent = isShowingAll ? "See Less" : "See More";
                        });
                    }

                } catch (error) {
                    showError(error.message);
                    listEl.innerHTML = "<p>Could not load books.</p>";
                }
            }

            // --- Load all sections on page start ---
            loadBookSection("/api/books/5-star", "5-star-list", "see-more-5-star");
            loadBookSection("/api/books/4-star", "4-star-list", "see-more-4-star");

        });
    </script>

</body>
</html>
