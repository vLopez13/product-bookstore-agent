<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Engine</title>
    
    <!-- Load Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Load CSS File -->
    <link rel="stylesheet" href="styles.css">

</head>
<body class="py-4 py-md-5">

    <div class="container my-5">
        <div class="card card-shadow-custom rounded-3 p-3 p-md-5 mx-auto" style="max-width: 900px;">
            <!-- Header -->
            <header class="text-center mb-5">
                <h1 class="display-5 fw-bold text-dark">
                    📚 Book Recommender 🤖
                </h1>
                <p class="mt-2 lead text-secondary">
                    Powered by SVD Collaborative Filtering from your FastAPI backend.
                </p>
            </header>
            <div class="d-flex flex-column flex-md-row gap-3 mb-5 p-4 bg-light rounded border border-info-subtle">
                <label for="userIdInput" class="visually-hidden">Enter User ID</label>
                <input type="number" id="userIdInput" placeholder="Enter User ID (e.g., 1, 2, 3)" value="2"
                       class="form-control p-3 flex-grow-1"
                       min="1" />
                
                <button id="recommendButton" 
                        class="btn btn-primary btn-lg px-4 shadow-sm">
                    Get Top 3 Recommendations
                </button>
            </div>

            <!-- Results Display Area -->
            <div id="resultsContainer">
                <h2 class="h4 text-dark mb-4 pb-2 border-bottom">Your Reading List</h2>
                
                <div id="recommendationsList" class="row g-4">
                    <!-- Recommendations will be injected here -->
                    <p id="initialMessage" class="col-12 text-center text-secondary p-5 border border-dashed rounded">
                        Enter a User ID and click the button to see personalized book recommendations!
                    </p>
                </div>

                <!-- Loading Spinner and Error Message -->
                <div id="loadingIndicator" class="d-none text-center mt-4">
                    <div class="d-flex align-items-center justify-content-center">
                        <div class="spinner-border text-primary me-2" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <span class="text-primary fw-medium">Calculating recommendations...</span>
                    </div>
                </div>
                <div id="errorMessage" class="d-none text-center mt-3 text-danger p-3 bg-danger-subtle rounded">
                    <!-- Error messages will be injected here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Load Bootstrap JS Bundle (optional, but good for interactive features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const API_BASE_URL = 'http://localhost:8000'; // Assumes your FastAPI app runs on the default port
        const recommendationsList = document.getElementById('recommendationsList');
        const recommendButton = document.getElementById('recommendButton');
        const userIdInput = document.getElementById('userIdInput');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const initialMessage = document.getElementById('initialMessage');

        // Utility function to display messages
        function showMessage(element, text, isError = false) {
            element.textContent = text;
            element.classList.remove('d-none');
            // Reset styles
            element.classList.remove('text-primary'); 
            element.classList.remove('text-danger'); 

            if (isError) {
                element.classList.add('text-danger');
                element.classList.add('bg-danger-subtle');
            } else {
                element.classList.add('text-primary');
                element.classList.add('bg-primary-subtle');
            }
        }

        // Renders the recommendation cards
        function renderRecommendations(recommendations) {
            recommendationsList.innerHTML = ''; // Clear previous results
            initialMessage.classList.add('d-none'); // Hide initial message

            if (recommendations.length === 0) {
                recommendationsList.innerHTML = '<p class="col-12 text-center text-secondary p-5 border border-dashed rounded">No new recommendations found for this user.</p>';
                return;
            }

            recommendations.forEach((book, index) => {
                const card = `
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body p-4">
                                <span class="badge rounded-pill bg-primary text-white fs-5 mb-3">${index + 1}</span>
                                <h5 class="card-title fw-bold text-dark mb-2">${book.title}</h5>
                                <p class="card-text text-secondary mb-4">Product ID: ${book.product_id}</p>
                                <div class="d-flex align-items-center justify-content-between pt-2 border-top">
                                    <span class="small text-muted">Est. Rating</span>
                                    <span class="fs-4 fw-bolder text-success">${book.estimated_rating} / 5</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                recommendationsList.innerHTML += card;
            });
        }

        async function fetchRecommendations() {
            const userId = userIdInput.value.trim();

            if (!userId || isNaN(parseInt(userId))) {
                showMessage(errorMessage, "Please enter a valid User ID (a number).", true);
                return;
            }

            // Reset UI state
            errorMessage.classList.add('d-none');
            loadingIndicator.classList.remove('d-none');
            recommendationsList.innerHTML = '';
            initialMessage.classList.add('d-none');


            try {
                // Exponential backoff logic for API call handling
                let response;
                let data;
                const maxRetries = 3;
                let delay = 1000;

                for (let i = 0; i < maxRetries; i++) {
                    response = await fetch(`${API_BASE_URL}/recommendations/${userId}`);
                    if (response.status !== 429) { // 429 Too Many Requests
                        data = await response.json();
                        break;
                    }
                    console.warn(`Rate limit exceeded. Retrying in ${delay / 1000}s...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }

                if (!response || response.status === 429) {
                     throw new Error('API rate limit exceeded after multiple retries.');
                }

                if (response.ok) {
                    if (data.recommendations) {
                        renderRecommendations(data.recommendations);
                    } else if (data.message) {
                        // Handle messages like "User has rated all available products"
                        recommendationsList.innerHTML = `<p class="col-12 text-center text-secondary p-5 border border-dashed rounded">${data.message}</p>`;
                    } else {
                        throw new Error('Unexpected API response format.');
                    }
                } else {
                    // Handle API errors (e.g., 500 error from database)
                    throw new Error(data.error || data.Sorry || `Error fetching recommendations (Status: ${response.status})`);
                }

            } catch (error) {
                console.error("Fetch error:", error);
                showMessage(errorMessage, `API Error: ${error.message}. Check if your FastAPI server is running at ${API_BASE_URL}.`, true);
            } finally {
                loadingIndicator.classList.add('d-none');
            }
        }

        // Attach event listener
        recommendButton.addEventListener('click', fetchRecommendations);

        // Optional: Run on Enter key press
        userIdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchRecommendations();
            }
        });
    </script>
</body>
</html>
